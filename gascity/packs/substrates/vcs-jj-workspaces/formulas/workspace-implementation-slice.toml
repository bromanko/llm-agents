formula = "workspace-implementation-slice"
description = "Implement, verify, review, request integration, and clean up a bounded work slice in an isolated jj workspace."
version = 1

[[steps]]
id = "confirm-gates"
title = "Confirm gates for {{slice_title}}"
description = """
For target path {{target_path}}, confirm that {{slice_title}} has enough accepted scope to implement. If architecture, execution-plan, or task-breakdown gates are required by the scope brief, confirm they have passed before continuing.
"""

[[steps]]
id = "confirm-workspace"
title = "Confirm workspace isolation for {{slice_title}}"
description = """
Confirm the workstream workspace name {{workspace_name}} and whether it already exists. Low-level workspace lifecycle commands such as /ws-create, /ws-list, /ws-switch, and /ws-finish are provided by the user's existing workspace extension; do not implement duplicate commands in this repository.
"""
needs = ["confirm-gates"]

[[steps]]
id = "enter-workspace"
title = "Enter workspace {{workspace_name}}"
description = """
Create or switch to the jj workspace {{workspace_name}} using the canonical workspace command flow. The implementation session should run from the workspace repository root. If the workspace commands are unavailable, stop and ask the human to load the existing workspace extension instead of continuing inline.
"""
needs = ["confirm-workspace"]

[[steps]]
id = "workspace-preflight"
title = "Preflight workspace {{workspace_name}}"
description = """
In workspace {{workspace_name}}, run pwd, jj root, jj log -r @ --no-graph -T 'change_id', jj workspace list --color=never -T 'name ++ ":" ++ self.target().change_id() ++ "\\n"', and jj status --color=never. Confirm the current change id matches the {{workspace_name}} row in the templated workspace list. If the current directory is the default workspace or an unexpected workspace, stop.
"""
needs = ["enter-workspace"]

[[steps]]
id = "task-design"
title = "Design the implementation task"
description = """
Name the minimal files or target areas expected to change and the verification command or manual check that will prove the slice works. Keep the design within the accepted scope and inside {{target_path}} unless wider scope was explicitly granted.
"""
needs = ["workspace-preflight"]

[[steps]]
id = "implement"
title = "Implement {{slice_title}} in {{workspace_name}}"
description = """
Implement only the accepted slice inside the workspace. Do not make new product or architecture decisions while implementing. Do not edit the default workspace for this task.
"""
needs = ["task-design"]

[[steps]]
id = "workspace-verification"
title = "Verify {{slice_title}} in {{workspace_name}}"
description = """
Run the verification command or manual check named during task design from the workspace. Record the exact command, result, and any failures. Failed verification blocks workspace review acceptance until fixed or explicitly waived by a human.
"""
needs = ["implement"]

[[steps]]
id = "workspace-review"
title = "Review {{slice_title}} in {{workspace_name}}"
description = """
Review the workspace-local diff for scope, correctness, maintainability, verification evidence, and durable memory updates. State whether the workspace is ready for default-workspace integration.
"""
needs = ["workspace-verification"]

[[steps]]
id = "integration-request"
title = "Request integration for {{slice_title}}"
description = """
Summarize the workspace changes, verification, review result, and any risks. STOP here unless the human or source task explicitly delegated integration authority. Ask the human or integration owner whether to finish workspace {{workspace_name}} into the default workspace.
"""
needs = ["workspace-review"]

[[steps]]
id = "human-integration-gate"
title = "Human integration gate for {{workspace_name}}"
description = """
Confirm explicit human approval or prior delegation before running /ws-finish or any equivalent source-control integration. Record who approved integration, what command will be run, and what rollback or conflict path will be used if finishing fails.
"""
needs = ["integration-request"]

[[steps]]
id = "default-integration"
title = "Integrate {{workspace_name}} into default"
description = """
From the default workspace, integrate workspace {{workspace_name}} using the canonical workspace finish flow only after the human integration gate passes. Before finishing, confirm both the workstream workspace and the default workspace have no unexpected unsnapshotted changes. If the default workspace still contains uncommitted changes from a previous integration, stop for the human-owned source-control step that records or advances that integration before finishing another workspace. If conflicts occur, stop and resolve them explicitly or route back to the workspace; do not manually delete workspace files.
"""
needs = ["human-integration-gate"]

[[steps]]
id = "integration-verification"
title = "Verify integrated {{slice_title}}"
description = """
Run the relevant validation again from the default workspace after integration. Record the exact command and result. Integration is not complete until this check passes or a human explicitly accepts the failure.
"""
needs = ["default-integration"]

[[steps]]
id = "cleanup-and-acceptance"
title = "Clean up and request human acceptance"
description = """
Confirm workspace cleanup, summarize what changed after integration, which gates passed, what remains risky, and whether release readiness is needed. The human owns final acceptance and source-control commit or merge unless explicitly delegated.
"""
needs = ["integration-verification"]
