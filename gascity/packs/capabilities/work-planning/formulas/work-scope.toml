formula = "work-scope"
description = "Turn a work idea into a persisted, reviewed scope brief and route it through the right gates."
version = 1

[[steps]]
id = "intake"
title = "Intake {{work_title}}"
description = """
For target path {{target_path}}, capture the raw request for {{work_title}} without designing or implementing it. Record the source request, priority context, affected users or operators, and known constraints.

Raw work idea:
{{work_idea}}
"""

[[steps]]
id = "context-scan"
title = "Scan target context"
description = """
Read the nearest repository and target-path context before shaping the work: README files, roadmap or decision records, relevant plans, and existing files if they exist. Distinguish current facts from assumptions.
"""
needs = ["intake"]

[[steps]]
id = "problem-frame"
title = "Frame the problem and outcome"
description = """
State the user, operator, business, or technical problem, affected actors, desired outcome, and why this should be addressed now. If the problem is unclear, ask human questions instead of inventing motivation.
"""
needs = ["context-scan"]

[[steps]]
id = "slice-boundary"
title = "Define the smallest useful slice"
description = """
Define the smallest useful version of {{work_title}} that would deliver value or learning. List explicit non-goals and behavior that must be deferred.
"""
needs = ["problem-frame"]

[[steps]]
id = "acceptance-criteria"
title = "Write acceptance criteria"
description = """
Write observable, testable acceptance criteria for the smallest useful slice. Prefer criteria that can later become tests, demo checks, or manual verification steps.
"""
needs = ["slice-boundary"]

[[steps]]
id = "architecture-screen"
title = "Screen architecture impact"
description = """
Identify architecture impact without designing the full solution. Note touched areas, data model implications, external integrations, security or compliance concerns, operational concerns, and whether the work forces a durable architecture decision or spike before implementation.
"""
needs = ["acceptance-criteria"]

[[steps]]
id = "risk-routing"
title = "Capture risks and route next"
description = """
Capture product, domain, technical, security, operational, and verification risks. Then recommend exactly one next route: direct implementation, spike, architecture decision, execution plan, roadmap or decision update, defer, or reject. Explain why the chosen route is the lightest safe path.
"""
needs = ["architecture-screen"]

[[steps]]
id = "persist-draft"
title = "Persist work scope draft"
description = """
Write or update a work scope document at {{target_path}}/work-scopes/{{work_slug}}.md using the shared work-scope template from this pack. Mark the status as draft or in review. Do not hide assumptions; record them as risks, unknowns, or human questions.
"""
needs = ["risk-routing"]

[[steps]]
id = "adversarial-review"
title = "Adversarially review {{work_title}} scope"
description = """
Review the persisted work scope document as a skeptical reviewer. Classify findings as blocking or non-blocking. For each finding, say whether the work lead may resolve it automatically or whether it needs human decision.
"""
needs = ["persist-draft"]

[[steps]]
id = "lead-reconciliation"
title = "Reconcile scope review"
description = """
Update the scope document for review feedback that only clarifies wording, tightens criteria, records existing non-goals, or fixes inconsistencies. Elevate feedback that changes product scope, architecture, risk acceptance, recorded decisions, or release assumptions. Record both resolved and elevated feedback in the document.
"""
needs = ["adversarial-review"]

[[steps]]
id = "scope-gate"
title = "Human scope gate for {{work_title}}"
description = """
Present the reconciled work scope brief to the human. The work item is not ready for implementation until the human accepts the problem, smallest useful slice, non-goals, recommended route, and any elevated questions, or explicitly asks for revisions.
"""
needs = ["lead-reconciliation"]
